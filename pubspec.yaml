name: bonushora
description: BonusHora - Plataforma de Banco de Tempo e Impacto Social.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  lucide_icons_flutter: ^3.0.4
  material_symbols_icons: ^4.2815.0
  mobile_scanner: ^7.0.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/illustrations/
    - assets/logos/
    - assets/avatars/
    - assets/animations/
    - assets/mock/
